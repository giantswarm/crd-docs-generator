# DO NOT EDIT. This file is generated by `devctl gen circleci` and kept in sync
# by the giantswarm/github align-files workflow. Change the generator in devctl
# (pkg/gen/input/circleci) or the gen.ci config in giantswarm/github, not here.
# Repo-specific jobs and workflows go in .circleci/custom.yml, which the setup
# workflow in .circleci/config.yml merges into this file at pipeline runtime.
version: 2.1
orbs:
  architect: giantswarm/architect@9.5.2

workflows:
  build:
    jobs:
    - architect/go-build:
        name: go-build
        binary: crd-docs-generator
        context: architect
        # Cross-platform binaries attached to the GitHub Release by the
        # upload-release-assets job below (cli flavour). yamllint disables the
        # line-length rule for the 132-char matrix value.
        # yamllint disable-line rule:line-length
        architectures: "linux/amd64,linux/arm64,darwin/amd64,darwin/arm64,windows/amd64,windows/arm64"
        # The six-arch cross-compile is cold after every go.sum bump (the GOCACHE
        # restore misses), so compile the architectures concurrently on a larger
        # box instead of sequentially on 2 vCPUs. build_concurrency is opt-in in
        # the orb because it only pays off at a bigger resource_class.
        build_concurrency: auto
        resource_class: large
        filters:
          tags:
            only: /^v.*/

    # Attach the cross-platform go-build binaries to the GitHub Release on tag
    # builds. The release itself is created by the repo's auto-release flow.
    - architect/upload-release-assets:
        context: architect
        name: upload-release-assets
        binary: crd-docs-generator
        requires:
        - go-build
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/

    # Branches: validate the image build without pushing anything (push: false
    # keeps the buildx result in the BuildKit cache). Same hadolint lint and
    # multi-arch build as the release job, so Dockerfile regressions surface
    # on the PR instead of at tag time.
    - architect/push-to-registries:
        context: architect
        name: build-image
        push: false
        # Same platform cap as the release job: go-build's six-target
        # architectures matrix writes all of them to .platforms, and buildx
        # must not attempt the darwin/windows manifests under QEMU.
        platforms: "linux/amd64,linux/arm64"
        requires:
        - go-build
        filters:
          branches:
            ignore:
            - main

    # Tag builds: push multi-arch image to gsoci + gsociprivate. Aliyun is
    # handled by the sync-china-registry job below (orb's split-china-push
    # mechanism), so the buildx push no longer crosses the Pacific.
    - architect/push-to-registries:
        context: architect
        name: push-to-registries-release
        split-china-push: true
        # Cap buildx to the two linux platforms. go-build's architectures
        # matrix above writes all six targets to .platforms; without this cap
        # the orb auto-derives --platform from that file and buildx tries to
        # build the darwin/windows manifests under QEMU and hangs.
        platforms: "linux/amd64,linux/arm64"
        requires:
        - go-build
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/

    # Mirror gsoci -> Aliyun via the in-China giantswarm/galaxy-runner. Runs
    # in parallel with the chart catalog push; Aliyun mirror failures do NOT
    # block the chart publish.
    - architect/sync-china-registry:
        context: architect
        name: sync-china-registry
        requires:
        - push-to-registries-release
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/
